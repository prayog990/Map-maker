<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Polyline Map - Adaptive GPS Tracker</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet PolylineDecorator for extra visual (optional) but using core -->
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: #2b2b3a;
            color: #f0f0f0;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e2a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* Header */
        .header {
            background: #0f0f1a;
            padding: 12px 16px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid #3a3a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 {
            margin: 0;
            font-size: 1.2rem;
        }
        .settings-btn {
            background: #2c2c3e;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: bold;
        }
        /* Live Data Box (3 lines) */
        .live-box {
            background: #0a0a12;
            margin: 12px 16px;
            border-radius: 20px;
            padding: 12px 16px;
            border-left: 6px solid #3b82f6;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .live-entry {
            font-family: monospace;
            font-size: 0.85rem;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a36;
            color: #bbd9ff;
        }
        .live-entry:last-child {
            border-bottom: none;
        }
        .live-label {
            font-weight: bold;
            color: #ffb347;
            display: inline-block;
            width: 70px;
        }
        .coord-value {
            word-break: break-all;
        }
        /* Map Container */
        .map-container {
            flex: 1;
            margin: 0 12px 12px 12px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #3a3a50;
            background: #2d2d3a;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        /* Control Buttons */
        .control-bar {
            display: flex;
            gap: 16px;
            justify-content: center;
            padding: 10px 16px;
            background: #13131e;
            border-top: 1px solid #2c2c3c;
        }
        button {
            background: #2b3b6e;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px black;
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #0f7b3a;
        }
        .btn-warning {
            background: #9a3e1f;
        }
        .download-btn {
            background: #2c5282;
        }
        /* Modal settings */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: #23233a;
            border-radius: 32px;
            padding: 24px;
            width: 85%;
            max-width: 340px;
            color: white;
        }
        .modal-card h3 {
            margin-top: 0;
            text-align: center;
        }
        .setting-item {
            margin: 18px 0;
        }
        .setting-item label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .setting-item input {
            width: 100%;
            padding: 8px;
            border-radius: 40px;
            border: none;
            text-align: center;
            font-weight: bold;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 8px;
        }
        .status-msg {
            font-size: 0.7rem;
            text-align: center;
            padding: 4px;
            background: #101018;
            margin: 0 16px 8px;
            border-radius: 20px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 6px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h2>📍 Smart Polyline Mapper</h2>
        <button class="settings-btn" id="openSettingsBtn">⚙️</button>
    </div>

    <!-- Live recent points box: 3 lines -->
    <div class="live-box" id="liveBox">
        <div class="live-entry"><span class="live-label">🔴 Newest:</span> <span id="latestCoord">--</span></div>
        <div class="live-entry"><span class="live-label">🟠 Previous:</span> <span id="prevCoord">--</span></div>
        <div class="live-entry"><span class="live-label">🟡 Older:</span> <span id="olderCoord">--</span></div>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>

    <div class="control-bar">
        <button id="startBtn" class="btn-primary">▶️ START</button>
        <button id="stopBtn" class="btn-warning">⏹️ STOP</button>
        <button id="downloadBtn" class="download-btn">📥 JSON</button>
    </div>
    <div class="status-msg" id="statusMsg">⚡ GPS अभी निष्क्रिय | START दबाएँ</div>
    <footer>Smart adapt: curve→10m | straight gradually to target</footer>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
    <div class="modal-card">
        <h3>⚙️ अनुकूलन सेटिंग</h3>
        <div class="setting-item">
            <label>📏 सामान्य अंतराल (10-300 m): <span id="baseDistVal">50</span> m</label>
            <input type="range" id="baseDistanceSlider" min="10" max="300" step="1" value="50">
        </div>
        <div class="setting-item">
            <label>🔄 कर्व अंतराल (2-50 m): <span id="curveDistVal">10</span> m</label>
            <input type="range" id="curveDistanceSlider" min="2" max="50" step="1" value="10">
        </div>
        <div class="setting-item">
            <label>📐 सीधा होने पर बढ़ाने की सीमा: <span id="straightMaxVal">50</span> m (Max)</label>
            <input type="range" id="straightMaxSlider" min="10" max="300" step="1" value="50">
        </div>
        <div class="modal-buttons">
            <button id="saveSettingsBtn">सेव करें</button>
            <button id="closeModalBtn">रद्द</button>
        </div>
    </div>
</div>

<script>
    // ---------- App State ----------
    let map = null;
    let polylineLayer = null;        // Leaflet polyline
    let markersLayer = null;         // marker group
    let watchId = null;
    let isTracking = false;
    let isMovementPaused = false;     // auto stop when stationary? but we implement logic: if user stops movement auto save stops, resume on movement
    let lastRecordedPoint = null;     // {lat, lng, timestamp}
    let allPoints = [];               // array of {lat, lng, timestamp}
    
    // adaptive state
    let currentAdaptiveGap = 50;      // dynamic gap (meters)
    let isCurveMode = false;           // currently in curve detection mode
    let consecutiveStraightCount = 0;  // to gradually increase gap
    
    // Settings
    let userBaseGap = 50;              // default normal straight target gap
    let curveGap = 10;                // when curve detected
    let maxStraightGap = 50;          // maximum gap when straight long road
    
    // internal GPS last position for distance & bearing
    let lastGpsPosition = null;        // for movement detection & distance check
    let lastRecordedCoord = null;      // last point saved (for distance threshold)
    let stationeryTimer = null;
    let wasStationary = false;          // if user stops moving, pause recording until move again
    
    // to avoid redundant saves in already-saved areas (we compare with existing points within radius)
    const SAVED_RADIUS_M = 15;          // if new point within 15m of any saved point, skip duplicate area
    
    // helper: haversine distance (meters)
    function getDistance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    
    // calculate bearing (degrees) between two points
    function getBearing(lat1, lng1, lat2, lng2) {
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δλ = (lng2 - lng1) * Math.PI/180;
        const y = Math.sin(Δλ) * Math.cos(φ2);
        const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
        let θ = Math.atan2(y, x);
        return (θ * 180/Math.PI + 360) % 360;
    }
    
    // curve detection: compare bearing change between last 3 points (if available)
    function isCurveDetected() {
        if (allPoints.length < 3) return false;
        const p1 = allPoints[allPoints.length-3];
        const p2 = allPoints[allPoints.length-2];
        const p3 = allPoints[allPoints.length-1];
        const bear12 = getBearing(p1.lat, p1.lng, p2.lat, p2.lng);
        const bear23 = getBearing(p2.lat, p2.lng, p3.lat, p3.lng);
        let delta = Math.abs(bear12 - bear23);
        delta = Math.min(delta, 360 - delta);
        // threshold: if bearing change > 20 degrees => curve
        return delta > 20;
    }
    
    // Update adaptive gap logic based on recent straight/curve
    function updateAdaptiveGap() {
        if (allPoints.length < 2) {
            currentAdaptiveGap = userBaseGap;
            isCurveMode = false;
            consecutiveStraightCount = 0;
            return;
        }
        const curveNow = isCurveDetected();
        if (curveNow) {
            // curve mode: force curve gap and reset straight counter
            isCurveMode = true;
            currentAdaptiveGap = curveGap;
            consecutiveStraightCount = 0;
            return;
        } 
        // Straight line scenario
        if (isCurveMode) {
            // freshly coming from curve to straight: start with small step (20m) then gradually increase
            isCurveMode = false;
            consecutiveStraightCount = 1;
            currentAdaptiveGap = Math.min(20, maxStraightGap);
        } else {
            // already straight, gradually increase
            if (consecutiveStraightCount < 3) {
                consecutiveStraightCount++;
                if (consecutiveStraightCount === 2) currentAdaptiveGap = Math.min(40, maxStraightGap);
                else if (consecutiveStraightCount === 3) currentAdaptiveGap = Math.min(maxStraightGap, userBaseGap);
                else currentAdaptiveGap = userBaseGap;
            } else {
                // keep target gap
                currentAdaptiveGap = userBaseGap;
            }
        }
        // ensure gap not less than curve gap when straight? but fine
        if (currentAdaptiveGap < curveGap && !isCurveMode) currentAdaptiveGap = curveGap;
        if (currentAdaptiveGap > maxStraightGap) currentAdaptiveGap = maxStraightGap;
    }
    
    // Check if location already exists nearby (avoid duplicate area)
    function isAlreadySavedNearby(lat, lng, thresholdM = SAVED_RADIUS_M) {
        for (let p of allPoints) {
            if (getDistance(p.lat, p.lng, lat, lng) <= thresholdM) return true;
        }
        return false;
    }
    
    // Add point to collection, update UI & map
    function addPoint(lat, lng) {
        const now = new Date();
        const point = { lat, lng, timestamp: now.toISOString() };
        allPoints.push(point);
        lastRecordedCoord = { lat, lng };
        
        // update live box (show last 3)
        updateLiveBox();
        
        // redraw polyline and markers
        drawPolylineAndMarkers();
        
        // after adding point, recompute adaptive logic for next point
        updateAdaptiveGap();
        
        // optional: if point added, update lastRecordedPoint for distance threshold
        lastRecordedPoint = { lat, lng, timestamp: now };
    }
    
    function updateLiveBox() {
        const len = allPoints.length;
        const latest = len>0 ? allPoints[len-1] : null;
        const prev = len>1 ? allPoints[len-2] : null;
        const older = len>2 ? allPoints[len-3] : null;
        
        document.getElementById('latestCoord').innerHTML = latest ? `${latest.lat.toFixed(6)}, ${latest.lng.toFixed(6)}` : '--';
        document.getElementById('prevCoord').innerHTML = prev ? `${prev.lat.toFixed(6)}, ${prev.lng.toFixed(6)}` : '--';
        document.getElementById('olderCoord').innerHTML = older ? `${older.lat.toFixed(6)}, ${older.lng.toFixed(6)}` : '--';
    }
    
    function drawPolylineAndMarkers() {
        if (!map) return;
        if (polylineLayer) map.removeLayer(polylineLayer);
        if (markersLayer) map.removeLayer(markersLayer);
        
        const latlngs = allPoints.map(p => [p.lat, p.lng]);
        if (latlngs.length > 1) {
            polylineLayer = L.polyline(latlngs, { color: '#3b82f6', weight: 5, opacity: 0.9 }).addTo(map);
        } else {
            polylineLayer = null;
        }
        // markers: small dots for each point
        markersLayer = L.layerGroup().addTo(map);
        allPoints.forEach((p, idx) => {
            const marker = L.circleMarker([p.lat, p.lng], {
                radius: 3,
                fillColor: '#ffcc33',
                color: '#fff',
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(markersLayer);
            if (idx === allPoints.length-1) {
                marker.bindTooltip('Latest', { permanent: false, direction: 'top' });
            }
        });
        if (latlngs.length > 0) {
            map.fitBounds(latlngs, { padding: [30,30] });
        }
    }
    
    // Core GPS handler: movement, adaptive distance, curve detection, auto resume
    function handleGPSPosition(position) {
        if (!isTracking) return;
        const { latitude, longitude, accuracy } = position.coords;
        const currentPos = { lat: latitude, lng: longitude };
        
        // auto-pause/resume based on movement: if user stops moving (speed < 0.2 m/s for 5 sec) => pause recording
        if (lastGpsPosition) {
            const moveDist = getDistance(lastGpsPosition.lat, lastGpsPosition.lng, currentPos.lat, currentPos.lng);
            const timeDelta = (position.timestamp - (lastGpsTimestamp || position.timestamp)) / 1000;
            const speed = timeDelta > 0 ? moveDist / timeDelta : 0;
            if (speed < 0.2 && moveDist < 1.5) {
                if (!wasStationary) {
                    wasStationary = true;
                    document.getElementById('statusMsg').innerHTML = '⏸️ रुक गए, स्वचालित रोक (फिर चलने पर शुरू)';
                }
                return;   // stationary, don't record
            } else {
                if (wasStationary) {
                    wasStationary = false;
                    document.getElementById('statusMsg').innerHTML = '🚶‍♂️ चलना शुरू, डेटा संग्रह जारी...';
                }
            }
        }
        lastGpsPosition = currentPos;
        lastGpsTimestamp = position.timestamp;
        
        // Check area already saved? skip if current location already near existing point (within radius 15m)
        if (isAlreadySavedNearby(latitude, longitude, SAVED_RADIUS_M)) {
            // already saved data in this region, don't save duplicate
            document.getElementById('statusMsg').innerHTML = '📍 यह क्षेत्र पहले से सेव है, नया पॉइंट नहीं';
            return;
        }
        
        // Now evaluate if we should record based on adaptive distance from last recorded point
        if (!lastRecordedCoord) {
            // first point: always record
            addPoint(latitude, longitude);
            document.getElementById('statusMsg').innerHTML = `✅ पहला पॉइंट सेव (gap:${currentAdaptiveGap}m)`;
            return;
        }
        
        const distFromLast = getDistance(lastRecordedCoord.lat, lastRecordedCoord.lng, latitude, longitude);
        let targetGap = currentAdaptiveGap;
        
        // Extra: we also recompute curve detection before distance? But adaptive logic update happens after each point addition.
        // Before recording, check if curve condition: we can override gap dynamically using latest bearing change.
        // Better: check instantaneous curve detection between last point and previous points if allPoints>2
        let overrideCurveGap = false;
        if (allPoints.length >= 2) {
            const lastTwo = [allPoints[allPoints.length-2], allPoints[allPoints.length-1]];
            const tempBear1 = getBearing(lastTwo[0].lat, lastTwo[0].lng, lastTwo[1].lat, lastTwo[1].lng);
            const tempBear2 = getBearing(lastTwo[1].lat, lastTwo[1].lng, latitude, longitude);
            let deltaB = Math.abs(tempBear1 - tempBear2);
            deltaB = Math.min(deltaB, 360-deltaB);
            if (deltaB > 20) {
                targetGap = curveGap;
                overrideCurveGap = true;
            }
        }
        
        if (distFromLast >= targetGap) {
            addPoint(latitude, longitude);
            let modeMsg = overrideCurveGap ? "(curve mode)" : (isCurveMode ? "(curve)" : "straight");
            document.getElementById('statusMsg').innerHTML = `📌 पॉइंट सेव | दूरी: ${distFromLast.toFixed(1)}m / लक्ष्य: ${targetGap}m ${modeMsg}`;
        } else {
            // not enough distance
            document.getElementById('statusMsg').innerHTML = `⏳ चल रहा है... ${distFromLast.toFixed(1)}m / ${targetGap}m आवश्यक`;
        }
    }
    
    function startTracking() {
        if (watchId !== null) return;
        if (!navigator.geolocation) {
            alert("GPS समर्थित नहीं");
            return;
        }
        isTracking = true;
        wasStationary = false;
        // reset adaptive state but keep collected points? yes continue from existing points
        // reset adaptive based on existing points if any
        if (allPoints.length >= 2) updateAdaptiveGap();
        else { currentAdaptiveGap = userBaseGap; isCurveMode=false; consecutiveStraightCount=0; }
        
        watchId = navigator.geolocation.watchPosition(
            handleGPSPosition,
            (err) => { console.warn(err); document.getElementById('statusMsg').innerHTML = "⚠️ GPS त्रुटि"; },
            { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
        );
        document.getElementById('statusMsg').innerHTML = "🟢 ट्रैकिंग सक्रिय | Smart Gap: " + currentAdaptiveGap + "m";
    }
    
    function stopTracking() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        isTracking = false;
        wasStationary = false;
        lastGpsPosition = null;
        document.getElementById('statusMsg').innerHTML = "🔴 ट्रैकिंग बंद | डेटा सुरक्षित";
    }
    
    function downloadJSON() {
        if (allPoints.length === 0) {
            alert("कोई डेटा उपलब्ध नहीं");
            return;
        }
        const exportData = {
            exportedAt: new Date().toISOString(),
            settings: { baseGap: userBaseGap, curveGap: curveGap, maxStraightGap: maxStraightGap },
            totalPoints: allPoints.length,
            points: allPoints
        };
        const jsonStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([jsonStr], {type: "application/json"});
        const a = document.createElement("a");
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = `polyline_data_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById('statusMsg').innerHTML = "📁 JSON डाउनलोड हो गया";
    }
    
    function applySettings() {
        userBaseGap = parseInt(document.getElementById("baseDistanceSlider").value);
        curveGap = parseInt(document.getElementById("curveDistanceSlider").value);
        maxStraightGap = parseInt(document.getElementById("straightMaxSlider").value);
        document.getElementById("baseDistVal").innerText = userBaseGap;
        document.getElementById("curveDistVal").innerText = curveGap;
        document.getElementById("straightMaxVal").innerText = maxStraightGap;
        if (curveGap < 2) curveGap = 2;
        if (userBaseGap < curveGap) userBaseGap = curveGap;
        if (maxStraightGap < userBaseGap) maxStraightGap = userBaseGap;
        // reset adaptive if tracking not running or just update
        if (!isTracking && allPoints.length > 1) updateAdaptiveGap();
        else if (!isTracking) { currentAdaptiveGap = userBaseGap; }
        document.getElementById('statusMsg').innerHTML = `⚙️ सेटिंग अपडेट: सामान्य=${userBaseGap}m, कर्व=${curveGap}m, मैक्स=${maxStraightGap}m`;
    }
    
    // init map
    function initMap() {
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB'
        }).addTo(map);
        markersLayer = L.layerGroup().addTo(map);
    }
    
    // modal handling
    const modal = document.getElementById('settingsModal');
    document.getElementById('openSettingsBtn').onclick = () => {
        document.getElementById("baseDistanceSlider").value = userBaseGap;
        document.getElementById("curveDistanceSlider").value = curveGap;
        document.getElementById("straightMaxSlider").value = maxStraightGap;
        document.getElementById("baseDistVal").innerText = userBaseGap;
        document.getElementById("curveDistVal").innerText = curveGap;
        document.getElementById("straightMaxVal").innerText = maxStraightGap;
        modal.style.display = 'flex';
    };
    document.getElementById('saveSettingsBtn').onclick = () => {
        applySettings();
        modal.style.display = 'none';
    };
    document.getElementById('closeModalBtn').onclick = () => { modal.style.display = 'none'; };
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    
    document.getElementById('startBtn').onclick = startTracking;
    document.getElementById('stopBtn').onclick = stopTracking;
    document.getElementById('downloadBtn').onclick = downloadJSON;
    
    initMap();
    // initial settings display
    applySettings();
</script>
</body>
</html>
