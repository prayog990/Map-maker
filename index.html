<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Polyline Collector</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }
        body { font-family: sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primary); color: white; padding: 10px; text-align: center; font-weight: bold; }
        
        #data-display {
            background: #1e293b; color: #34d399; padding: 10px; font-family: monospace; font-size: 0.8rem;
            height: 80px; overflow: hidden; display: flex; flex-direction: column-reverse;
        }
        .log-line { border-bottom: 1px solid #334155; padding: 2px 0; }

        #map { flex-grow: 1; width: 100%; }

        .controls { padding: 15px; display: flex; gap: 10px; justify-content: center; background: white; border-top: 1px solid #ddd; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .start { background: #22c55e; color: white; }
        .stop { background: #ef4444; color: white; }
        .settings-btn { background: #64748b; color: white; }

        /* Settings Modal */
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 80%; max-width: 400px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>Smart Route Tracker</header>

<div id="data-display">
    <div class="log-line">Waiting to start...</div>
</div>

<div id="map"></div>

<div class="controls">
    <button class="start" id="startBtn">Start</button>
    <button class="stop" id="stopBtn" style="display:none;">Stop</button>
    <button class="settings-btn" onclick="toggleModal(true)">Settings</button>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h3>Settings</h3>
        <div class="field">
            <label>Default Distance (10-300m):</label>
            <input type="number" id="cfgMaxDist" value="50" min="10" max="300">
        </div>
        <div class="field">
            <label>Curve Distance (m):</label>
            <input type="number" id="cfgCurveDist" value="10">
        </div>
        <button class="start" onclick="saveSettings()">Save & Close</button>
        <button class="settings-btn" onclick="downloadJSON()" style="margin-top:10px; width:100%;">Download JSON Data</button>
        <button class="stop" onclick="clearData()" style="margin-top:10px; width:100%;">Clear All Data</button>
        <button onclick="toggleModal(false)" style="margin-top:10px; background:none; color:grey; width:100%;">Cancel</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, polyline, watchId;
    let savedPoints = JSON.parse(localStorage.getItem('routeData')) || [];
    let isTracking = false;
    
    // Settings
    let config = {
        maxDist: 50,
        curveDist: 10,
        currentGap: 50
    };

    // Initialize Map
    function initMap() {
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        polyline = L.polyline(savedPoints.map(p => [p.lat, p.lng]), {color: 'blue'}).addTo(map);
        if(savedPoints.length > 0) {
            map.setView([savedPoints[savedPoints.length-1].lat, savedPoints[savedPoints.length-1].lng], 15);
            updateLogDisplay();
        }
    }

    // Haversine Formula for distance
    function getDistance(p1, p2) {
        const R = 6371e3; 
        const dLat = (p2.lat - p1.lat) * Math.PI / 180;
        const dLon = (p2.lng - p1.lng) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // Calculate Heading/Bearing to detect curve
    function getHeading(p1, p2) {
        const y = Math.sin((p2.lng - p1.lng) * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180);
        const x = Math.cos(p1.lat * Math.PI / 180) * Math.sin(p2.lat * Math.PI / 180) -
                  Math.sin(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) * Math.cos((p2.lng - p1.lng) * Math.PI / 180);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function updateLogDisplay() {
        const display = document.getElementById('data-display');
        display.innerHTML = '';
        const lastThree = savedPoints.slice(-3);
        lastThree.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerText = `Pt: ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)} | Gap: ${p.gap}m`;
            display.appendChild(div);
        });
    }

    function startTracking() {
        if (!navigator.geolocation) return alert("GPS not supported");
        isTracking = true;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';

        watchId = navigator.geolocation.watchPosition(position => {
            const newPoint = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
                timestamp: new Date().toISOString(),
                gap: 0
            };

            if (savedPoints.length > 0) {
                const lastPoint = savedPoints[savedPoints.length - 1];
                const distFromLast = getDistance(lastPoint, newPoint);

                // 1. Check if user is stationary
                if (distFromLast < 2) return; 

                // 2. Check if area already saved (Duplicate avoidance)
                const isAlreadySaved = savedPoints.some(p => getDistance(p, newPoint) < 5);
                if (isAlreadySaved) return;

                // 3. Curve Detection & Smart Gapping
                let isCurve = false;
                if (savedPoints.length >= 2) {
                    const prevHeading = getHeading(savedPoints[savedPoints.length-2], lastPoint);
                    const currentHeading = getHeading(lastPoint, newPoint);
                    const diff = Math.abs(prevHeading - currentHeading);
                    if (diff > 5 && diff < 355) isCurve = true; // Curve detected
                }

                if (isCurve) {
                    config.currentGap = config.curveDist;
                } else {
                    // Gradual increase on straight path
                    if (config.currentGap < config.maxDist) {
                        config.currentGap += 20; 
                        if (config.currentGap > config.maxDist) config.currentGap = config.maxDist;
                    }
                }

                if (distFromLast >= config.currentGap) {
                    newPoint.gap = Math.round(config.currentGap);
                    savePoint(newPoint);
                }
            } else {
                savePoint(newPoint);
            }
        }, err => console.error(err), { enableHighAccuracy: true });
    }

    function savePoint(pt) {
        savedPoints.push(pt);
        localStorage.setItem('routeData', JSON.stringify(savedPoints));
        polyline.addLatLng([pt.lat, pt.lng]);
        map.panTo([pt.lat, pt.lng]);
        updateLogDisplay();
    }

    function stopTracking() {
        navigator.geolocation.clearWatch(watchId);
        isTracking = false;
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    function toggleModal(show) {
        document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
    }

    function saveSettings() {
        config.maxDist = parseInt(document.getElementById('cfgMaxDist').value);
        config.curveDist = parseInt(document.getElementById('cfgCurveDist').value);
        toggleModal(false);
    }

    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedPoints));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "route_data.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function clearData() {
        if(confirm("Kya aap saara data delete krna chahte h?")) {
            savedPoints = [];
            localStorage.removeItem('routeData');
            polyline.setLatLngs([]);
            updateLogDisplay();
            alert("Data cleared!");
        }
    }

    document.getElementById('startBtn').addEventListener('click', startTracking);
    document.getElementById('stopBtn').addEventListener('click', stopTracking);

    window.onload = initMap;
</script>

</body>
</html>
